databases:
  - name: techstore-db
    plan: free
    databaseName: techstore
    user: techstore

services:
  - type: web
    name: techstore-web
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn techstore.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: techstore-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
