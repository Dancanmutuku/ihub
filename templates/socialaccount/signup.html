{% extends 'base.html' %}
{% block title %}Complete Sign Up – TechStore KE{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:440px;">
  <div class="auth-card">
    <div class="auth-header text-center mb-4">
      <i class="bi bi-google display-4 text-accent"></i>
      <h3 class="mt-2 mb-0">Complete Your Profile</h3>
      <p class="text-muted small">Finish setting up your TechStore KE account</p>
    </div>
    <form method="post" action="{% url 'socialaccount_signup' %}">
      {% csrf_token %}
      {% if form.email %}
      <div class="mb-3">
        <label class="form-label">Email</label>
        {{ form.email }}
      </div>
      {% endif %}
      <button type="submit" class="btn btn-hero-primary w-100">
        <i class="bi bi-check-circle me-2"></i>Confirm & Continue
      </button>
    </form>
  </div>
</div>
{% endblock %}
