{% extends 'base.html' %}
{% block title %}Register - TechVault{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:2.5rem">
                <div class="text-center mb-4">
                    <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:1.5rem;color:var(--primary)">TECH<span style="color:var(--accent)">VAULT</span></div>
                    <h4 style="color:white;margin-top:1rem;font-weight:700">Create Account</h4>
                    <p style="color:var(--text-dim);font-size:0.9rem">Join thousands of tech enthusiasts</p>
                </div>

                <a href="/social-auth/login/google-oauth2/" style="background:#fff;color:#333;border:none;border-radius:6px;padding:0.75rem;display:flex;align-items:center;justify-content:center;gap:0.8rem;text-decoration:none;font-weight:600;font-size:0.95rem;margin-bottom:1.5rem">
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.5 2.8 13.6l7.8 6C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/><path fill="#FBBC05" d="M10.6 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.8 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.5-9.9l-7.8 6C6.6 42.5 14.6 48 24 48z"/></svg>
                    Sign up with Google
                </a>

                <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
                    <hr style="flex:1;border-color:var(--border)"><span style="color:var(--text-dim);font-size:0.85rem">or</span><hr style="flex:1;border-color:var(--border)">
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username *</label>
                        <input type="text" name="username" class="form-control" placeholder="techuser_ke" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password *</label>
                        <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm Password *</label>
                        <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
                    </div>
                    <button type="submit" class="btn-primary-custom w-100" style="padding:0.8rem;font-size:1rem">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                <p class="text-center mt-3" style="color:var(--text-dim);font-size:0.9rem">
                    Already have an account? <a href="{% url 'login' %}" style="color:var(--primary);text-decoration:none;font-weight:600">Sign In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
